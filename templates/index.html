<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cinema Insights | Multi-Theater Database</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #000814;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #00eaff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      text-shadow: 0 0 15px #00eaff;
    }

    h3 {
      color: #b8e3ff;
      margin-bottom: 40px;
    }

    .beam {
      position: absolute;
      width: 2px;
      height: 100%;
      background: linear-gradient(to top, #00eaff33, transparent);
      animation: beamMove 6s infinite linear;
      opacity: 0.8;
    }

    @keyframes beamMove {
      from { transform: translateX(-50vw); }
      to { transform: translateX(50vw); }
    }

    .btn-custom {
      border-radius: 30px;
      margin: 10px;
      padding: 10px 40px;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .btn-login {
      background: #007bff;
      color: white;
      border: none;
    }

    .btn-login:hover {
      background: #3399ff;
      box-shadow: 0 0 10px #007bff;
    }

    .btn-register {
      border: 2px solid #00ff99;
      color: #00ff99;
      background: transparent;
    }

    .btn-register:hover {
      background: #00ff99;
      color: black;
      box-shadow: 0 0 10px #00ff99;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #bdefff;
    }
  </style>
</head>

<body>
  <div class="beam" style="left: 25%; animation-delay: 0s;"></div>
  <div class="beam" style="left: 50%; animation-delay: 2s;"></div>
  <div class="beam" style="left: 75%; animation-delay: 4s;"></div>

  <div class="text-center">
    <h1>CINEMA INSIGHTS</h1>
    <h3>Multi-Theater Database Management Project</h3>

    <div>
      <a href="{{ url_for('login') }}" class="btn btn-custom btn-login">Login</a>
      <a href="{{ url_for('register') }}" class="btn btn-custom btn-register">Register</a>
    </div>
  </div>

  <footer>© 2025 Cinema Insights | Powered by Flask & MySQL</footer>
</body>
</html>
