<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎟 Register - Theatre Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
    }
    .register-box h3 {
      color: #28a745;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="register-box">
    <h3 class="text-center mb-3">📝 Register</h3>

    <!-- Feedback message -->
    {% if message %}
      <div class="alert alert-{{ category }} text-center">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" pattern="[0-9]{10}" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-success">Register</button>
      </div>
    </form>

    <hr>

    <!-- Already have an account? -->
    <div class="text-center mb-3">
      <p class="text-muted mb-1">Already have an account?</p>
      <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm"> Login here</a>
    </div>

    <!-- Back to Home Button -->
    <div class="text-center">
      <a href="{{ url_for('home') }}" class="btn btn-outline-secondary btn-sm">Back to Home</a>
    </div>
  </div>
</body>
</html>
