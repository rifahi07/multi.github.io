<!DOCTYPE html>
<html>
<head>
  <title>Manage Admins</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
  <div class="container bg-white p-4 rounded shadow">
    <h3>Manage Admins</h3>

    <form method="POST" action="{{ url_for('add_admin') }}" class="row g-2 mb-3">
      <div class="col-md-3"><input class="form-control" name="username" placeholder="Username" required></div>
      <div class="col-md-3"><input class="form-control" name="email" placeholder="Email"></div>
      <div class="col-md-3"><input class="form-control" name="password" placeholder="Password" required></div>
      <div class="col-md-2">
        <select name="theatre_id" class="form-select">
          <option value="">No Theatre</option>
          {% for t in theatres %}
          <option value="{{ t.theatre_id }}">{{ t.theatre_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-1"><button class="btn btn-success w-100">Add</button></div>
    </form>

    <table class="table table-bordered">
      <thead class="table-dark"><tr><th>ID</th><th>Name</th><th>Email</th><th>Theatre</th><th>Action</th></tr></thead>
      <tbody>
        {% for a in admins %}
        <tr>
          <td>{{ a.admin_id }}</td>
          <td>{{ a.name }}</td>
          <td>{{ a.email }}</td>
          <td>{{ a.theatre_id }}</td>
          <td><a href="{{ url_for('delete_admin', admin_id=a.admin_id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete admin?')">Delete</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">⬅ Back</a>
  </div>
</body>
</html>
