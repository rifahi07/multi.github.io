<!DOCTYPE html>
<html>
<head>
  <title>Edit Staff Schedule</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
<div class="container bg-white p-4 rounded shadow">
  <h3 class="mb-3">✏ Edit Staff Schedule</h3>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Work Date</label>
      <input type="date" name="work_date" class="form-control" value="{{ schedule.work_date }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Day</label>
      <input type="text" name="day" class="form-control" value="{{ schedule.day }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Start Time</label>
      <input type="time" name="start_time" class="form-control" value="{{ schedule.start_time }}">
    </div>

    <div class="mb-3">
      <label class="form-label">End Time</label>
      <input type="time" name="end_time" class="form-control" value="{{ schedule.end_time }}">
    </div>

    <button type="submit" class="btn btn-primary">💾 Save</button>
    <a href="{{ url_for('manage_staff') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
</body>
</html>
