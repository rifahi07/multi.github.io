<!DOCTYPE html>
<html>
<head>
  <title>{{ 'Edit' if record else 'Add' }} {{ table|capitalize }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light p-4">
  <div class="container bg-white p-4 rounded shadow">
    <h3 class="mb-4">{{ 'Edit' if record else 'Add New' }} {{ table|replace('_', ' ')|capitalize }}</h3>

    <form method="POST">
      {% for col in columns %}
        {% if 'auto_increment' not in col.Extra %}
          <div class="mb-3">
            <label class="form-label">{{ col.Field|replace('_', ' ')|capitalize }}</label>
            <input 
              type="text" 
              name="{{ col.Field }}" 
              class="form-control" 
              value="{{ record[col.Field] if record else '' }}" 
              placeholder="Enter {{ col.Field|replace('_', ' ')|lower }}">
          </div>
        {% endif %}
      {% endfor %}

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary w-25">{{ 'Update' if record else 'Save' }}</button>
        <a href="{{ url_for('view_table', table=table) }}" class="btn btn-secondary w-25">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
