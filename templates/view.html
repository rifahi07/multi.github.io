
<!DOCTYPE html>

<html>
<head>
  <title>{{ table|capitalize }} Records</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
  <div class="container bg-white p-4 rounded shadow">
    <h3>{{ table|capitalize }} Table</h3>
    <a href="{{ url_for('add_record', table=table) }}" class="btn btn-success mb-3">➕ Add New</a>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          {% for col in columns %}
          <th>{{ col }}</th>
          {% endfor %}
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for row in records %}
        <tr>
          {% for col in columns %}
          <td>{{ row[col] }}</td>
          {% endfor %}
          <td>
            <a href="{{ url_for('edit_record', table=table, record_id=row[columns[0]]) }}" class="btn btn-warning btn-sm">✏ Edit</a>
            <a href="{{ url_for('delete_record', table=table, record_id=row[columns[0]]) }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete this record?');">🗑 Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">⬅ Back</a>
  </div>
</body>
</html>
