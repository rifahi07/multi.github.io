<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎬 Theatre Management Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .login-box h3 {
      font-weight: 600;
      color: #007bff;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h3 class="text-center mb-3">🎟 Login</h3>

    <!-- Flash message -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }} text-center py-2 mb-3">
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label for="role" class="form-label">Login as</label>
        <select class="form-select" id="role" name="role" required>
          <option value="">-- Select Role --</option>
          <option value="admin">Admin</option>
          <option value="staff">Staff</option>
          <option value="customer">Customer</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>

    <!-- Forgot password -->
    <div class="text-center mt-3">
      <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">Forgot your password?</a>
    </div>

    <hr>

    <div class="text-center">
      <p class="text-muted mb-2">Don't have an account?</p>
      <a href="{{ url_for('register') }}" class="btn btn-outline-success">Register</a>
    </div>

    <div class="text-center mt-3">
      <a href="{{ url_for('home') }}" class="btn btn-outline-secondary btn-sm"> Back to Home</a>
    </div>
  </div>
</body>
</html>
