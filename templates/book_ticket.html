<!DOCTYPE html>
<html>
<head>
  <title>Book Seats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .seat {
      width: 40px;
      height: 40px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      line-height: 40px;
      font-weight: bold;
      transition: all 0.2s ease-in-out;
    }
    .available { background-color: #4CAF50; color: white; }
    .booked { background-color: #ccc; color: #666; cursor: not-allowed; }
    .selected { background-color: #007bff; color: white; }
  </style>
</head>
<body class="bg-light">

<div class="container mt-5 bg-white p-4 rounded shadow">
  <h3 class="text-center text-primary mb-4">🎟 Select Your Seats</h3>

  {% if message %}
  <div class="alert alert-info text-center">{{ message }}</div>
  {% endif %}

  <div class="text-center mb-3">
    <p class="text-muted">Click on available seats to select multiple.</p>
  </div>

  <form method="POST" id="seatForm">
    <div class="d-flex flex-wrap justify-content-center mb-4">
      {% for seat in all_seats %}
        {% if seat.seat_id in booked_seat_ids %}
          <div class="seat booked">{{ seat.seat_number }}</div>
        {% else %}
          <div class="seat available" data-seat-id="{{ seat.seat_id }}">{{ seat.seat_number }}</div>
        {% endif %}
      {% endfor %}
    </div>

    <input type="hidden" name="seat_ids" id="seat_ids">

    <div class="text-center">
      <button type="submit" class="btn btn-primary">Confirm Booking</button>
      <a href="/customer" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
  const selectedSeats = new Set();
  document.querySelectorAll('.seat.available').forEach(seat => {
    seat.addEventListener('click', () => {
      const seatId = seat.getAttribute('data-seat-id');
      if (selectedSeats.has(seatId)) {
        selectedSeats.delete(seatId);
        seat.classList.remove('selected');
      } else {
        selectedSeats.add(seatId);
        seat.classList.add('selected');
      }
      document.getElementById('seat_ids').value = Array.from(selectedSeats).join(',');
    });
  });
</script>

</body>
</html>
